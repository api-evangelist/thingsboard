components:
  schemas:
    AdminSettings:
      type: object
      description: A JSON value representing the Mail Settings.
      properties:
        id:
          $ref: '#/components/schemas/AdminSettingsId'
          description: The Id of the Administration Settings, auto-generated, UUID
        createdTime:
          type: integer
          format: int64
          description: Timestamp of the settings creation, in milliseconds
          example: 1609459200000
          readOnly: true
        tenantId:
          $ref: '#/components/schemas/TenantId'
          description: JSON object with Tenant Id.
          readOnly: true
        key:
          type: string
          description: The Administration Settings key, (e.g. 'general' or 'mail')
          example: mail
        jsonValue:
          $ref: '#/components/schemas/JsonNode'
          description: JSON representation of the Administration Settings value
    AdminSettingsId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the entity, time-based UUID v1
          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - ADMIN_SETTINGS
          example: ADMIN_SETTINGS
      required:
      - entityType
      - id
    AuditLog:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/AuditLogId'
          description: JSON object with the auditLog Id
        createdTime:
          type: integer
          format: int64
          description: Timestamp of the auditLog creation, in milliseconds
          example: 1609459200000
          readOnly: true
        tenantId:
          $ref: '#/components/schemas/TenantId'
          description: JSON object with Tenant Id
          readOnly: true
        customerId:
          $ref: '#/components/schemas/CustomerId'
          description: JSON object with Customer Id
          readOnly: true
        entityId:
          $ref: '#/components/schemas/EntityId'
          description: JSON object with Entity id
          readOnly: true
        entityName:
          type: string
          description: Name of the logged entity
          example: Thermometer
          readOnly: true
        userId:
          $ref: '#/components/schemas/UserId'
          description: JSON object with User id.
          readOnly: true
        userName:
          type: string
          description: Unique user name(email) of the user that performed some action on logged entity
          example: tenant@thingsboard.org
          readOnly: true
        actionType:
          type: string
          description: String represented Action type
          enum:
          - ADDED
          - DELETED
          - UPDATED
          - ATTRIBUTES_UPDATED
          - ATTRIBUTES_DELETED
          - TIMESERIES_UPDATED
          - TIMESERIES_DELETED
          - RPC_CALL
          - CREDENTIALS_UPDATED
          - ASSIGNED_TO_CUSTOMER
          - UNASSIGNED_FROM_CUSTOMER
          - ACTIVATED
          - SUSPENDED
          - CREDENTIALS_READ
          - ATTRIBUTES_READ
          - RELATION_ADD_OR_UPDATE
          - RELATION_DELETED
          - RELATIONS_DELETED
          - REST_API_RULE_ENGINE_CALL
          - ALARM_ACK
          - ALARM_CLEAR
          - ALARM_DELETE
          - ALARM_ASSIGNED
          - ALARM_UNASSIGNED
          - LOGIN
          - LOGOUT
          - LOCKOUT
          - ASSIGNED_FROM_TENANT
          - ASSIGNED_TO_TENANT
          - PROVISION_SUCCESS
          - PROVISION_FAILURE
          - ASSIGNED_TO_EDGE
          - UNASSIGNED_FROM_EDGE
          - ADDED_COMMENT
          - UPDATED_COMMENT
          - DELETED_COMMENT
          - SMS_SENT
          example: ADDED
          readOnly: true
        actionData:
          $ref: '#/components/schemas/JsonNode'
          description: JsonNode represented action data
          readOnly: true
        actionStatus:
          type: string
          description: String represented Action status
          enum:
          - SUCCESS
          - FAILURE
          example: SUCCESS
          readOnly: true
        actionFailureDetails:
          type: string
          description: Failure action details info. An empty string in case of action status type 'SUCCESS', otherwise includes stack trace of the caused exception.
          readOnly: true
    AuditLogId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: string
          example: 784f394c-42b6-435a-983c-b7beff2784f9
      required:
      - id
    AutoCommitSettings:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/AutoVersionCreateConfig'
    AutoVersionCreateConfig:
      type: object
      properties:
        saveRelations:
          type: boolean
        saveAttributes:
          type: boolean
        saveCredentials:
          type: boolean
        saveCalculatedFields:
          type: boolean
        branch:
          type: string
    AwsSnsSmsProviderConfiguration:
      allOf:
      - $ref: '#/components/schemas/SmsProviderConfiguration'
      - type: object
        properties:
          accessKeyId:
            type: string
            description: The AWS SNS Access Key ID.
          secretAccessKey:
            type: string
            description: The AWS SNS Access Key.
          region:
            type: string
            description: The AWS region.
    CalculatedFieldDebugEventFilter:
      allOf:
      - $ref: '#/components/schemas/EventFilter'
      - type: object
        properties:
          server:
            type: string
            description: String value representing the server name, identifier or ip address where the platform is running
            example: ip-172-31-24-152
          isError:
            type: boolean
            writeOnly: true
          errorStr:
            type: string
            description: The case insensitive 'contains' filter based on error message
            example: not present in the DB
          entityId:
            type: string
            description: String value representing the entity id in the event body
            example: 57b6bafe-d600-423c-9267-fe31e5218986
          entityType:
            type: string
            description: String value representing the entity type
            enum:
            - DEVICE
          msgId:
            type: string
            description: String value representing the message id in the rule engine
            example: dcf44612-2ce4-4e5d-b462-ebb9c5628228
          msgType:
            type: string
            description: String value representing the message type
            example: POST_TELEMETRY_REQUEST
          arguments:
            type: string
            description: String value representing the arguments that were used in the calculation performed
            example:
              x:
                ts: 1739432016629
                value: 20
              y:
                ts: 1739429717656
                value: 12
          result:
            type: string
            description: String value representing the result of a calculation
            example:
              x + y: 32
          error:
            type: boolean
      required:
      - eventType
    CustomerId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the entity, time-based UUID v1
          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - CUSTOMER
          example: CUSTOMER
      required:
      - entityType
      - id
    DummyJobConfiguration:
      allOf:
      - $ref: '#/components/schemas/JobConfiguration'
      - type: object
        properties:
          taskProcessingTimeMs:
            type: integer
            format: int64
          successfulTasksCount:
            type: integer
            format: int32
          failedTasksCount:
            type: integer
            format: int32
          permanentlyFailedTasksCount:
            type: integer
            format: int32
          errors:
            type: array
            items:
              type: string
          retries:
            type: integer
            format: int32
          taskProcessingTimeoutMs:
            type: integer
            format: int64
          generalError:
            type: string
          submittedTasksBeforeGeneralError:
            type: integer
            format: int32
