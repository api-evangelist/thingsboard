          example: highTemperatureAlarmID
        alarmType:
          type: string
          description: String value representing type of the alarm
          example: High Temperature Alarm
        createRules:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AlarmRule'
          description: Complex JSON object representing create alarm rules. The unique create alarm rule can be created for each alarm severity type. There can be 5 create alarm rules configured per a single
            alarm type. See method implementation notes and AlarmRule model for more details
        clearRule:
          $ref: '#/components/schemas/AlarmRule'
          description: JSON object representing clear alarm rule
        propagate:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to parent entities of alarm originator
          example: true
        propagateToOwner:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to the owner (tenant or customer) of alarm originator
          example: true
        propagateToTenant:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to the tenant entity
          example: true
        propagateRelationTypes:
          type: array
          description: JSON array of relation types that should be used for propagation. By default, 'propagateRelationTypes' array is empty which means that the alarm will be propagated based on any relation
            type to parent entities. This parameter should be used only in case when 'propagate' parameter is set to true, otherwise, 'propagateRelationTypes' array will be ignored.
