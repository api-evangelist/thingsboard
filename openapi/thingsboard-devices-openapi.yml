  /api/customer/public/device/{deviceId}:
    post:
      tags:
      - device-controller
      summary: Make Device Publicly Available (assignDeviceToPublicCustomer)
      description: 'Device will be available for non-authorized (not logged-in) users. This is useful to create dashboards that you plan to share/embed on a publicly available website. However, users that
        are logged-in and belong to different tenant will not be able to access the device.


        Available for users with ''TENANT_ADMIN'' authority.'
      operationId: assignDeviceToPublicCustomer
      parameters:
      - name: deviceId
        in: path
        description: A string value representing the device id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /api/customer/device/{deviceName}/claim:
    post:
      tags:
      - device-controller
      summary: Claim Device (claimDevice)
      description: "Claiming makes it possible to assign a device to the specific customer using device/server side claiming data (in the form of secret key).To make this happen you have to provide unique\
        \ device name and optional claiming data (it is needed only for device-side claiming).Once device is claimed, the customer becomes its owner and customer users may access device data as well as\
        \ control the device. \nIn order to enable claiming devices feature a system parameter security.claim.allowClaimingByDefault should be set to true, otherwise a server-side claimingAllowed attribute\
        \ with the value true is obligatory for provisioned devices. \nSee official documentation for more details regarding claiming.\n\nAvailable for users with 'CUSTOMER_USER' authority."
      operationId: claimDevice
      parameters:
      - name: deviceName
        in: path
        description: Unique name of the device which is going to be claimed
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
    delete:
      tags:
      - device-controller
      summary: Reclaim Device (reClaimDevice)
      description: 'Reclaiming means the device will be unassigned from the customer and the device will be available for claiming again.


        Available for users with ''TENANT_ADMIN'' or ''CUSTOMER_USER'' authority.'
      operationId: reClaimDevice
      parameters:
      - name: deviceName
        in: path
        description: Unique name of the device which is going to be reclaimed
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
  /api/tenant/devices:
    get:
      tags:
      - device-controller
      summary: Get Tenant Device (getTenantDevice)
      description: 'Requested device must be owned by tenant that the user belongs to. Device name is an unique property of device. So it can be used to identify the device.


        Available for users with ''TENANT_ADMIN'' authority.'
      operationId: getTenantDevices
      parameters:
      - name: pageSize
        in: query
        description: Maximum amount of entities in a one page
        required: true
        schema:
          type: integer
          format: int32
      - name: page
