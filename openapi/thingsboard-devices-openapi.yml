        description: 'A string value representing the device connectivity protocol. Possible values: ''mqtt'', ''mqtts'', ''http'', ''https'', ''coap'', ''coaps'''
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                format: binary
  /api/device-connectivity/{deviceId}:
    get:
      tags:
      - device-connectivity-controller
      summary: Get Commands to Publish Device Telemetry (getDevicePublishTelemetryCommands)
      description: "Fetch the list of commands to publish device telemetry based on device profile If the user has the authority of 'Tenant Administrator', the server checks that the device is owned by\
        \ the same tenant. If the user has the authority of 'Customer User', the server checks that the device is assigned to the same customer. \n\nAvailable for users with 'TENANT_ADMIN' or 'CUSTOMER_USER'\
        \ authority."
      operationId: getDevicePublishTelemetryCommands
      parameters:
      - name: deviceId
        in: path
        description: A string value representing the device id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                http:
                  description: http
                  value: curl -v -X POST http://localhost:8080/api/v1/0ySs4FTOn5WU15XLmal8/telemetry --header Content-Type:application/json --data {temperature:25}
                mqtt:
                  description: mqtt
                  value: mosquitto_pub -d -q 1 -h localhost -t v1/devices/me/telemetry -i myClient1 -u myUsername1 -P myPassword -m {temperature:25}
                coap:
                  description: coap
                  value: coap-client -m POST coap://localhost:5683/api/v1/0ySs4FTOn5WU15XLmal8/telemetry -t json -e {temperature:25}
  /api/device-connectivity/gateway-launch/{deviceId}/docker-compose/download:
    get:
      tags:
      - device-connectivity-controller
      summary: Download Generated Docker-compose.yml File for Gateway (downloadGatewayDockerCompose)
      description: Download generated docker-compose.yml for gateway.
      operationId: downloadGatewayDockerCompose
      parameters:
      - name: deviceId
        in: path
        description: A string value representing the device id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                format: binary
  /api/customer/{customerId}/devices:
    get:
      tags:
      - device-controller
      summary: Get Customer Devices (getCustomerDevices)
      description: "Returns a page of devices objects assigned to customer. You can specify parameters to filter the results. The result is wrapped with PageData object that allows you to iterate over result\
        \ set using pagination. See response schema for more details. \n\nAvailable for users with 'TENANT_ADMIN' or 'CUSTOMER_USER' authority."
      operationId: getCustomerDevices
      parameters:
      - name: customerId
        in: path
        description: A string value representing the customer id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      - name: pageSize
        in: query
        description: Maximum amount of entities in a one page
        required: true
        schema:
          type: integer
          format: int32
      - name: page
        in: query
        description: Sequence number of page starting from 0
        required: true
        schema:
          type: integer
          format: int32
      - name: type
        in: query
        description: Device type as the name of the device profile
        required: false
        schema:
          type: string
      - name: textSearch
        in: query
        description: The case insensitive 'substring' filter based on the device name.
        required: false
        schema:
          type: string
      - name: sortProperty
        in: query
        description: Property of entity to sort by
        required: false
        schema:
          type: string
          enum:
          - createdTime
          - name
          - deviceProfileName
          - label
          - customerTitle
      - name: sortOrder
        in: query
        description: Sort order. ASC (ASCENDING) or DESC (DESCENDING)
        required: false
        schema:
          type: string
          enum:
          - ASC
          - DESC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataDevice'
  /api/customer/{customerId}/deviceInfos:
    get:
      tags:
      - device-controller
      summary: Get Customer Device Infos (getCustomerDeviceInfos)
      description: "Returns a page of devices info objects assigned to customer. You can specify parameters to filter the results. The result is wrapped with PageData object that allows you to iterate over\
        \ result set using pagination. See response schema for more details. Device Info is an extension of the default Device object that contains information about the assigned customer name and device\
        \ profile name. \n\nAvailable for users with 'TENANT_ADMIN' or 'CUSTOMER_USER' authority."
      operationId: getCustomerDeviceInfos
      parameters:
      - name: customerId
        in: path
        description: A string value representing the customer id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      - name: pageSize
        in: query
        description: Maximum amount of entities in a one page
        required: true
        schema:
          type: integer
          format: int32
      - name: page
        in: query
        description: Sequence number of page starting from 0
        required: true
        schema:
          type: integer
          format: int32
      - name: type
        in: query
        description: Device type as the name of the device profile
        required: false
        schema:
          type: string
      - name: deviceProfileId
        in: query
        description: A string value representing the device profile id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: false
        schema:
          type: string
      - name: active
        in: query
        description: A boolean value representing the device active flag.
        required: false
        schema:
          type: boolean
      - name: textSearch
        in: query
        description: The case insensitive 'substring' filter based on the device name.
        required: false
        schema:
          type: string
      - name: sortProperty
        in: query
        description: Property of entity to sort by
        required: false
        schema:
          type: string
          enum:
          - createdTime
          - name
          - deviceProfileName
          - label
          - customerTitle
      - name: sortOrder
        in: query
        description: Sort order. ASC (ASCENDING) or DESC (DESCENDING)
        required: false
        schema:
          type: string
          enum:
          - ASC
          - DESC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataDeviceInfo'
  /api/customer/device/{deviceId}:
    delete:
      tags:
      - device-controller
      summary: Unassign Device from Customer (unassignDeviceFromCustomer)
      description: 'Clears assignment of the device to customer. Customer will not be able to query device afterwards.


        Available for users with ''TENANT_ADMIN'' authority.'
      operationId: unassignDeviceFromCustomer
      parameters:
      - name: deviceId
        in: path
        description: A string value representing the device id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
components:
  schemas:
    AlarmCondition:
      type: object
      properties:
        condition:
          type: array
          description: JSON array of alarm condition filters
          items:
            $ref: '#/components/schemas/AlarmConditionFilter'
        spec:
          description: JSON object representing alarm condition type
          oneOf:
          - $ref: '#/components/schemas/DurationAlarmConditionSpec'
          - $ref: '#/components/schemas/RepeatingAlarmConditionSpec'
          - $ref: '#/components/schemas/SimpleAlarmConditionSpec'
    AlarmConditionFilter:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/AlarmConditionFilterKey'
          description: JSON object for specifying alarm condition by specific key
        valueType:
          type: string
          description: String representation of the type of the value
          enum:
          - STRING
          - NUMERIC
          - BOOLEAN
          - DATE_TIME
          example: NUMERIC
        value:
          description: Value used in Constant comparison. For other types, such as TIME_SERIES or ATTRIBUTE, the predicate condition is used
        predicate:
          description: JSON object representing filter condition
          oneOf:
          - $ref: '#/components/schemas/BooleanFilterPredicate'
          - $ref: '#/components/schemas/ComplexFilterPredicate'
          - $ref: '#/components/schemas/NumericFilterPredicate'
          - $ref: '#/components/schemas/StringFilterPredicate'
    AlarmConditionFilterKey:
      type: object
      properties:
        type:
          type: string
          description: The key type
          enum:
          - ATTRIBUTE
          - TIME_SERIES
          - ENTITY_FIELD
          - CONSTANT
          example: TIME_SERIES
        key:
          type: string
          description: String value representing the key
          example: temp
    AlarmConditionSpec:
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    AlarmRule:
      type: object
      properties:
        condition:
          $ref: '#/components/schemas/AlarmCondition'
          description: JSON object representing the alarm rule condition
        schedule:
          description: JSON object representing time interval during which the rule is active
          oneOf:
          - $ref: '#/components/schemas/AnyTimeSchedule'
          - $ref: '#/components/schemas/CustomTimeSchedule'
          - $ref: '#/components/schemas/SpecificTimeSchedule'
        alarmDetails:
          type: string
          description: String value representing the additional details for an alarm rule
        dashboardId:
          $ref: '#/components/schemas/DashboardId'
          description: JSON object with the dashboard Id representing the reference to alarm details dashboard used by mobile application
    AlarmSchedule:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
          enum:
          - ANY_TIME
          - SPECIFIC_TIME
          - CUSTOM
        dynamicValue:
          $ref: '#/components/schemas/DynamicValueString'
    AllowCreateNewDevicesDeviceProfileProvisionConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceProfileProvisionConfiguration'
    AnyTimeSchedule:
      allOf:
      - $ref: '#/components/schemas/AlarmSchedule'
    BooleanFilterPredicate:
      allOf:
      - $ref: '#/components/schemas/KeyFilterPredicate'
      - type: object
        properties:
          operation:
            type: string
            enum:
            - EQUAL
            - NOT_EQUAL
          value:
            $ref: '#/components/schemas/FilterPredicateValueBoolean'
    BulkImportRequest:
      type: object
      properties:
        file:
          type: string
        mapping:
          $ref: '#/components/schemas/Mapping'
    BulkImportResultDevice:
      type: object
      properties:
        created:
          type: object
          properties:
            opaque:
              type: integer
              format: int32
            acquire:
              type: integer
              format: int32
            release:
              type: integer
              format: int32
              writeOnly: true
            andIncrement:
              type: integer
              format: int32
            andDecrement:
              type: integer
              format: int32
            plain:
              type: integer
              format: int32
        updated:
          type: object
          properties:
            opaque:
              type: integer
              format: int32
            acquire:
              type: integer
              format: int32
            release:
              type: integer
              format: int32
              writeOnly: true
            andIncrement:
              type: integer
              format: int32
            andDecrement:
              type: integer
              format: int32
            plain:
              type: integer
              format: int32
        errors:
          type: object
          properties:
            opaque:
              type: integer
              format: int32
            acquire:
              type: integer
              format: int32
            release:
              type: integer
              format: int32
              writeOnly: true
            andIncrement:
              type: integer
              format: int32
            andDecrement:
              type: integer
              format: int32
            plain:
              type: integer
              format: int32
        errorsList:
          type: array
          items:
            type: string
    CheckPreProvisionedDevicesDeviceProfileProvisionConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceProfileProvisionConfiguration'
    ClaimRequest:
      type: object
      description: Claiming request which can optionally contain secret key
      properties:
        secretKey:
          type: string
    ClientAttributesQueryingSnmpCommunicationConfig:
      allOf:
      - $ref: '#/components/schemas/SnmpCommunicationConfig'
      - type: object
        properties:
          mappings:
            type: array
            items:
              $ref: '#/components/schemas/SnmpMapping'
          queryingFrequencyMs:
            type: integer
            format: int64
    CoapDeviceProfileTransportConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceProfileTransportConfiguration'
      - type: object
        properties:
          coapDeviceTypeConfiguration:
            oneOf:
            - $ref: '#/components/schemas/DefaultCoapDeviceTypeConfiguration'
            - $ref: '#/components/schemas/EfentoCoapDeviceTypeConfiguration'
          clientSettings:
            $ref: '#/components/schemas/PowerSavingConfiguration'
    CoapDeviceTransportConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceTransportConfiguration'
      - type: object
        properties:
          powerMode:
            type: string
            enum:
            - PSM
            - DRX
            - E_DRX
          psmActivityTimer:
            type: integer
            format: int64
          edrxCycle:
            type: integer
            format: int64
          pagingTransmissionWindow:
            type: integer
            format: int64
    CoapDeviceTypeConfiguration:
      discriminator:
        propertyName: coapDeviceType
      properties:
        coapDeviceType:
          type: string
      required:
      - coapDeviceType
    ColumnMapping:
      type: object
      properties:
        type:
          type: string
          enum:
          - NAME
          - TYPE
          - LABEL
          - SHARED_ATTRIBUTE
          - SERVER_ATTRIBUTE
          - TIMESERIES
          - ACCESS_TOKEN
          - X509
          - MQTT_CLIENT_ID
          - MQTT_USER_NAME
          - MQTT_PASSWORD
          - LWM2M_CLIENT_ENDPOINT
          - LWM2M_CLIENT_SECURITY_CONFIG_MODE
          - LWM2M_CLIENT_IDENTITY
          - LWM2M_CLIENT_KEY
          - LWM2M_CLIENT_CERT
          - LWM2M_BOOTSTRAP_SERVER_SECURITY_MODE
          - LWM2M_BOOTSTRAP_SERVER_PUBLIC_KEY_OR_ID
          - LWM2M_BOOTSTRAP_SERVER_SECRET_KEY
          - LWM2M_SERVER_SECURITY_MODE
          - LWM2M_SERVER_CLIENT_PUBLIC_KEY_OR_ID
          - LWM2M_SERVER_CLIENT_SECRET_KEY
          - SNMP_HOST
          - SNMP_PORT
          - SNMP_VERSION
          - SNMP_COMMUNITY_STRING
          - IS_GATEWAY
          - DESCRIPTION
          - ROUTING_KEY
          - SECRET
        key:
          type: string
    ComplexFilterPredicate:
      allOf:
      - $ref: '#/components/schemas/KeyFilterPredicate'
      - type: object
        properties:
          operation:
            type: string
            enum:
            - AND
            - OR
          predicates:
            type: array
            items: {}
      - type: object
        properties:
          operation:
            type: string
            enum:
            - AND
            - OR
          predicates:
            type: array
            items:
              oneOf:
              - $ref: '#/components/schemas/BooleanFilterPredicate'
              - $ref: '#/components/schemas/ComplexFilterPredicate'
              - $ref: '#/components/schemas/NumericFilterPredicate'
              - $ref: '#/components/schemas/StringFilterPredicate'
    CustomTimeSchedule:
      allOf:
      - $ref: '#/components/schemas/AlarmSchedule'
      - type: object
        properties:
          timezone:
            type: string
          items:
            type: array
            items:
              $ref: '#/components/schemas/CustomTimeScheduleItem'
    CustomTimeScheduleItem:
      type: object
      properties:
        enabled:
          type: boolean
        dayOfWeek:
          type: integer
          format: int32
        startsOn:
          type: integer
          format: int64
        endsOn:
          type: integer
          format: int64
    CustomerId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the entity, time-based UUID v1
          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - CUSTOMER
          example: CUSTOMER
      required:
      - entityType
      - id
    DashboardId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the entity, time-based UUID v1
          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - DASHBOARD
          example: DASHBOARD
      required:
      - entityType
      - id
    DefaultCoapDeviceTypeConfiguration:
      allOf:
      - $ref: '#/components/schemas/CoapDeviceTypeConfiguration'
      - type: object
        properties:
          transportPayloadTypeConfiguration:
            oneOf:
            - $ref: '#/components/schemas/JsonTransportPayloadConfiguration'
            - $ref: '#/components/schemas/ProtoTransportPayloadConfiguration'
    DefaultDeviceConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceConfiguration'
    DefaultDeviceProfileConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceProfileConfiguration'
    DefaultDeviceProfileTransportConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceProfileTransportConfiguration'
    DefaultDeviceTransportConfiguration:
      allOf:
      - $ref: '#/components/schemas/DeviceTransportConfiguration'
    Device:
