            root rule chain will be used to process those messages.
        defaultDashboardId:
          $ref: '#/components/schemas/DashboardId'
          description: Reference to the dashboard. Used in the mobile application to open the default dashboard when user navigates to device details.
        defaultQueueName:
          type: string
          description: Rule engine queue name. If present, the specified queue will be used to store all unprocessed messages related to device, including telemetry, attribute updates, etc. Otherwise, the
            'Main' queue will be used to store those messages.
        provisionDeviceKey:
          type: string
          description: Unique provisioning key used by 'Device Provisioning' feature.
        firmwareId:
          $ref: '#/components/schemas/OtaPackageId'
