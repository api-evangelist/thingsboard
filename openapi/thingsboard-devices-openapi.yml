          - ALLOW_CREATE_NEW_DEVICES
          - CHECK_PRE_PROVISIONED_DEVICES
          - X509_CERTIFICATE_CHAIN
        defaultRuleChainId:
          $ref: '#/components/schemas/RuleChainId'
