          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - TENANT
          example: TENANT
      required:
      - entityType
      - id
    TimeSeriesImmediateOutputStrategy:
      allOf:
      - $ref: '#/components/schemas/TimeSeriesOutputStrategy'
      - type: object
        properties:
          ttl:
            type: integer
            format: int64
          saveTimeSeries:
            type: boolean
          saveLatest:
            type: boolean
          sendWsUpdate:
            type: boolean
          processCfs:
            type: boolean
    TimeSeriesOutput:
      allOf:
      - $ref: '#/components/schemas/Output'
      - type: object
        properties:
          strategy:
            oneOf:
            - $ref: '#/components/schemas/TimeSeriesImmediateOutputStrategy'
            - $ref: '#/components/schemas/TimeSeriesRuleChainOutputStrategy'
    TimeSeriesOutputStrategy:
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    TimeSeriesRuleChainOutputStrategy:
      allOf:
      - $ref: '#/components/schemas/TimeSeriesOutputStrategy'
    ToCoreEdqsRequest:
      type: object
      properties:
        syncRequest:
          $ref: '#/components/schemas/EdqsSyncRequest'
        apiEnabled:
          type: boolean
    TsValue:
      type: object
      properties:
        ts:
          type: integer
          format: int64
        value:
          type: string
        count:
          type: integer
          format: int64
    UserId:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the entity, time-based UUID v1
          example: 784f394c-42b6-435a-983c-b7beff2784f9
        entityType:
          type: string
          description: string
          enum:
          - USER
          example: USER
      required:
      - entityType
      - id
  securitySchemes:
    HTTP login form:
      type: http
      description: Enter Username / Password
      scheme: loginPassword
      bearerFormat: /api/auth/login|X-Authorization
    API key form:
      type: apiKey
      description: 'Enter the API key value with ''ApiKey'' prefix in format: **ApiKey <your_api_key_value>**


        Example: **ApiKey tb_5te51SkLRYpjGrujUGwqkjFvooWBlQpVe2An2Dr3w13wjfxDW**


        <br>**NOTE**: Use only ONE authentication method at a time. If both are authorized, JWT auth takes the priority.<br>

        '
      name: X-Authorization
      in: header
