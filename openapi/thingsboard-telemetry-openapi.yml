        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - SIMPLE
            - SCRIPT
            - GEOFENCING
            - ALARM
            - PROPAGATION
            - RELATED_ENTITIES_AGGREGATION
            - ENTITY_AGGREGATION
          uniqueItems: true
      - name: entityType
        in: query
        description: Entity type filter. If not specified, calculated fields for all supported entity types will be returned.
        required: false
        schema:
          type: string
          enum:
          - TENANT
          - CUSTOMER
          - USER
          - DASHBOARD
          - ASSET
          - DEVICE
          - ALARM
          - RULE_CHAIN
          - RULE_NODE
          - ENTITY_VIEW
          - WIDGETS_BUNDLE
          - WIDGET_TYPE
          - TENANT_PROFILE
          - DEVICE_PROFILE
          - ASSET_PROFILE
          - API_USAGE_STATE
          - TB_RESOURCE
          - OTA_PACKAGE
          - EDGE
          - RPC
          - QUEUE
          - NOTIFICATION_TARGET
          - NOTIFICATION_TEMPLATE
          - NOTIFICATION_REQUEST
          - NOTIFICATION
          - NOTIFICATION_RULE
          - QUEUE_STATS
          - OAUTH2_CLIENT
          - DOMAIN
          - MOBILE_APP
          - MOBILE_APP_BUNDLE
          - CALCULATED_FIELD
          - JOB
          - ADMIN_SETTINGS
          - AI_MODEL
          - API_KEY
      - name: entities
        in: query
        description: Entities filter. If not specified, calculated fields for entity type filter will be returned.
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
      - name: name
        in: query
        description: Name filter. To specify multiple names, duplicate 'name' parameter for each name, for example '?name=name1&name=name2
        required: false
        schema:
          type: string
      - name: textSearch
        in: query
        description: The case insensitive 'substring' filter based on the calculated field name.
        required: false
        schema:
          type: string
      - name: sortProperty
        in: query
        description: Property of entity to sort by
        required: false
        schema:
          type: string
          enum:
          - createdTime
          - name
      - name: sortOrder
        in: query
        description: Sort order. ASC (ASCENDING) or DESC (DESCENDING)
        required: false
        schema:
          type: string
          enum:
          - ASC
          - DESC
      - name: params
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/MultiValueMapStringString'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataCalculatedFieldInfo'
  /api/calculatedFields/names:
    get:
      tags:
      - calculated-field-controller
      summary: Get Calculated Field Names (getCalculatedFieldNames)
      description: Fetch the list of calculated field names for specified type.
      operationId: getCalculatedFieldNames
      parameters:
      - name: type
        in: query
        description: Calculated field type filter.
        required: true
        schema:
          type: string
          enum:
          - SIMPLE
          - SCRIPT
          - GEOFENCING
          - ALARM
          - PROPAGATION
          - RELATED_ENTITIES_AGGREGATION
          - ENTITY_AGGREGATION
      - name: pageSize
        in: query
        description: Maximum amount of entities in a one page
        required: true
        schema:
          type: integer
          format: int32
      - name: page
        in: query
        description: Sequence number of page starting from 0
        required: true
        schema:
          type: integer
          format: int32
      - name: textSearch
        in: query
        description: The case insensitive 'substring' filter based on the calculated field name.
        required: false
        schema:
          type: string
      - name: sortOrder
        in: query
        description: Sort order. ASC (ASCENDING) or DESC (DESCENDING)
        required: false
        schema:
          type: string
          enum:
          - ASC
          - DESC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataString'
  /api/calculatedField/{calculatedFieldId}:
    get:
      tags:
      - calculated-field-controller
      summary: Get Calculated Field (getCalculatedFieldById)
      description: Fetch the Calculated Field object based on the provided Calculated Field Id.
      operationId: getCalculatedFieldById
      parameters:
      - name: calculatedFieldId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatedField'
    delete:
      tags:
      - calculated-field-controller
      summary: Delete Calculated Field (deleteCalculatedField)
      description: 'Deletes the calculated field. Referencing non-existing Calculated Field Id will cause an error.


        Available for users with ''TENANT_ADMIN'' or ''CUSTOMER_USER'' authority.'
      operationId: deleteCalculatedField
      parameters:
      - name: calculatedFieldId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /api/calculatedField/{calculatedFieldId}/debug:
    get:
      tags:
      - calculated-field-controller
      summary: Get Latest Calculated Field Debug Event (getLatestCalculatedFieldDebugEvent)
      description: "Gets latest calculated field debug event for specified calculated field id. Referencing non-existing calculated field id will cause an error. \n\nAvailable for users with 'TENANT_ADMIN'\
        \ authority."
      operationId: getLatestCalculatedFieldDebugEvent
      parameters:
      - name: calculatedFieldId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonNode'
  /api/plugins/telemetry/{entityType}/{entityId}/timeseries/delete:
    delete:
      tags:
      - telemetry-controller
      summary: Delete Entity Time Series Data (deleteEntityTimeseries)
      description: "Delete time series for selected entity based on entity id, entity type and keys. Use 'deleteAllDataForKeys' to delete all time series data. Use 'startTs' and 'endTs' to specify time-range\
        \ instead.  Use 'deleteLatest' to delete latest value (stored in separate table for performance) if the value's timestamp matches the time-range.  Use 'rewriteLatestIfDeleted' to rewrite latest\
        \ value (stored in separate table for performance) if the value's timestamp matches the time-range and 'deleteLatest' param is true. The replacement value will be fetched from the 'time series'\
        \ table, and its timestamp will be the most recent one before the defined time-range. \n\nAvailable for users with 'TENANT_ADMIN' or 'CUSTOMER_USER' authority."
      operationId: deleteEntityTimeseries
      parameters:
      - name: entityType
        in: path
        description: A string value representing the entity type. For example, 'DEVICE'
        required: true
        schema:
          type: string
      - name: entityId
        in: path
        description: A string value representing the entity id. For example, '784f394c-42b6-435a-983c-b7beff2784f9'
        required: true
        schema:
          type: string
      - name: keys
        in: query
        description: A string value representing the comma-separated list of telemetry keys. If keys are not selected, the result will return all latest time series. For example, 'temperature,humidity'.
          If telemetry keys contain comma, duplicate 'key' parameter for each key, for example '?key=my,key&key=my,second,key
        required: false
        schema:
          type: string
      - name: deleteAllDataForKeys
        in: query
        description: A boolean value to specify if should be deleted all data for selected keys or only data that are in the selected time range.
        required: false
        schema:
          type: boolean
          default: false
      - name: startTs
        in: query
        description: A long value representing the start timestamp of removal time range in milliseconds.
        required: false
        schema:
          type: integer
          format: int64
      - name: endTs
        in: query
        description: A long value representing the end timestamp of removal time range in milliseconds.
        required: false
        schema:
          type: integer
          format: int64
      - name: deleteLatest
        in: query
        description: If the parameter is set to true, the latest telemetry can be removed, otherwise, in case that parameter is set to false the latest value will not removed.
        required: false
        schema:
          type: boolean
          default: true
      - name: rewriteLatestIfDeleted
        in: query
        description: If the parameter is set to true, the latest telemetry will be rewritten in case that current latest value was removed, otherwise, in case that parameter is set to false the new latest
          value will not set.
        required: false
        schema:
          type: boolean
          default: false
      - name: params
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/MultiValueMapStringString'
      responses:
        '200':
          description: Time series for the selected keys in the request was removed. Platform creates an audit log event about entity time series removal with action type 'TIMESERIES_DELETED'.
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Platform returns a bad request in case if keys list is empty or start and end timestamp values is empty when deleteAllDataForKeys is set to false.
          content:
            application/json:
              schema:
                type: string
        '401':
          description: User is not authorized to delete entity time series for selected entity. Most likely, User belongs to different Customer or Tenant.
          content:
            application/json:
              schema:
                type: string
        '500':
          description: The exception was thrown during processing the request. Platform creates an audit log event about entity time series removal with action type 'TIMESERIES_DELETED' that includes an
            error stacktrace.
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    AlarmAssignee:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
    AlarmCountQuery:
      type: object
      description: A JSON value representing the alarm count query.
      properties:
        startTs:
          type: integer
          format: int64
        endTs:
          type: integer
          format: int64
        timeWindow:
          type: integer
          format: int64
        typeList:
          type: array
          items:
            type: string
        statusList:
          type: array
          items:
            type: string
            enum:
            - ANY
            - ACTIVE
            - CLEARED
            - ACK
            - UNACK
        severityList:
          type: array
          items:
            type: string
            enum:
            - CRITICAL
            - MAJOR
            - MINOR
            - WARNING
            - INDETERMINATE
        searchPropagatedAlarms:
          type: boolean
        assigneeId:
          $ref: '#/components/schemas/UserId'
        entityFilter:
          oneOf:
          - $ref: '#/components/schemas/ApiUsageStateFilter'
          - $ref: '#/components/schemas/AssetSearchQueryFilter'
          - $ref: '#/components/schemas/AssetTypeFilter'
          - $ref: '#/components/schemas/DeviceSearchQueryFilter'
          - $ref: '#/components/schemas/DeviceTypeFilter'
          - $ref: '#/components/schemas/EdgeSearchQueryFilter'
          - $ref: '#/components/schemas/EdgeTypeFilter'
          - $ref: '#/components/schemas/EntityListFilter'
          - $ref: '#/components/schemas/EntityNameFilter'
          - $ref: '#/components/schemas/EntityTypeFilter'
          - $ref: '#/components/schemas/EntityViewSearchQueryFilter'
          - $ref: '#/components/schemas/EntityViewTypeFilter'
          - $ref: '#/components/schemas/RelationsQueryFilter'
          - $ref: '#/components/schemas/SingleEntityFilter'
        keyFilters:
          type: array
          items:
            $ref: '#/components/schemas/KeyFilter'
    AlarmData:
      type: object
      properties:
        entityId:
          $ref: '#/components/schemas/EntityId'
        latest:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/TsValue'
        id:
          $ref: '#/components/schemas/AlarmId'
          description: JSON object with the alarm Id. Specify this field to update the alarm. Referencing non-existing alarm Id will cause error. Omit this field to create new alarm.
        createdTime:
          type: integer
          format: int64
          description: Timestamp of the alarm creation, in milliseconds
          example: 1634058704567
          readOnly: true
        tenantId:
          $ref: '#/components/schemas/TenantId'
          description: JSON object with Tenant Id
          readOnly: true
        customerId:
          $ref: '#/components/schemas/CustomerId'
          description: JSON object with Customer Id
          readOnly: true
        type:
          type: string
          description: representing type of the Alarm
          example: High Temperature Alarm
        originator:
          $ref: '#/components/schemas/EntityId'
          description: JSON object with alarm originator id
        severity:
          type: string
          description: Alarm severity
          enum:
          - CRITICAL
          - MAJOR
          - MINOR
          - WARNING
          - INDETERMINATE
          example: CRITICAL
        acknowledged:
          type: boolean
          description: Acknowledged
          example: true
        cleared:
          type: boolean
          description: Cleared
          example: false
        assigneeId:
          $ref: '#/components/schemas/UserId'
          description: Alarm assignee user id
        startTs:
          type: integer
          format: int64
          description: Timestamp of the alarm start time, in milliseconds
          example: 1634058704565
        endTs:
          type: integer
          format: int64
          description: Timestamp of the alarm end time(last time update), in milliseconds
          example: 1634111163522
        ackTs:
          type: integer
          format: int64
          description: Timestamp of the alarm acknowledgement, in milliseconds
          example: 1634115221948
        clearTs:
          type: integer
          format: int64
          description: Timestamp of the alarm clearing, in milliseconds
          example: 1634114528465
        assignTs:
          type: integer
          format: int64
          description: Timestamp of the alarm assignment, in milliseconds
          example: 1634115928465
        propagate:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to parent entities of alarm originator
          example: true
        propagateToOwner:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to the owner (tenant or customer) of alarm originator
          example: true
        propagateToTenant:
          type: boolean
          description: Propagation flag to specify if alarm should be propagated to the tenant entity
          example: true
        propagateRelationTypes:
          type: array
          description: JSON array of relation types that should be used for propagation. By default, 'propagateRelationTypes' array is empty which means that the alarm will be propagated based on any relation
            type to parent entities. This parameter should be used only in case when 'propagate' parameter is set to true, otherwise, 'propagateRelationTypes' array will be ignored.
          items:
            type: string
        originatorName:
          type: string
          description: Alarm originator name
          example: Thermostat
        originatorLabel:
          type: string
          description: Alarm originator label
          example: Thermostat label
        originatorDisplayName:
          type: string
          description: Originator display name
          example: Thermostat
        assignee:
          $ref: '#/components/schemas/AlarmAssignee'
          description: Alarm assignee
        name:
          type: string
          description: representing type of the Alarm
          example: High Temperature Alarm
          readOnly: true
        status:
          type: string
          description: status of the Alarm
          enum:
          - ACTIVE_UNACK
          - ACTIVE_ACK
          - CLEARED_UNACK
          - CLEARED_ACK
          example: ACTIVE_UNACK
          readOnly: true
        details:
          $ref: '#/components/schemas/JsonNode'
      required:
      - acknowledged
      - cleared
      - name
      - originator
      - severity
      - status
      - type
    AlarmDataPageLink:
      type: object
      properties:
        startTs:
          type: integer
          format: int64
        endTs:
          type: integer
          format: int64
        timeWindow:
          type: integer
          format: int64
        typeList:
          type: array
          items:
            type: string
        statusList:
          type: array
          items:
            type: string
            enum:
            - ANY
            - ACTIVE
            - CLEARED
            - ACK
            - UNACK
        severityList:
          type: array
          items:
            type: string
            enum:
            - CRITICAL
            - MAJOR
            - MINOR
            - WARNING
            - INDETERMINATE
        searchPropagatedAlarms:
          type: boolean
        assigneeId:
          $ref: '#/components/schemas/UserId'
        pageSize:
          type: integer
          format: int32
        page:
          type: integer
          format: int32
        textSearch:
          type: string
        sortOrder:
          $ref: '#/components/schemas/EntityDataSortOrder'
        dynamic:
          type: boolean
    AlarmDataQuery:
