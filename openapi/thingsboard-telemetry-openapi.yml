    RelationPathQueryDynamicSourceConfiguration:
      allOf:
      - $ref: '#/components/schemas/CfArgumentDynamicSourceConfiguration'
      - type: object
        properties:
          levels:
            type: array
            items:
              $ref: '#/components/schemas/RelationPathLevel'
    RelationsQueryFilter:
      allOf:
      - $ref: '#/components/schemas/EntityFilter'
      - type: object
        properties:
          rootEntity:
            $ref: '#/components/schemas/AliasEntityId'
          multiRootEntitiesType:
            type: string
            enum:
            - TENANT
            - CUSTOMER
            - USER
            - DASHBOARD
            - ASSET
            - DEVICE
            - ALARM
            - RULE_CHAIN
            - RULE_NODE
            - ENTITY_VIEW
            - WIDGETS_BUNDLE
            - WIDGET_TYPE
            - TENANT_PROFILE
            - DEVICE_PROFILE
            - ASSET_PROFILE
            - API_USAGE_STATE
            - TB_RESOURCE
            - OTA_PACKAGE
            - EDGE
            - RPC
            - QUEUE
            - NOTIFICATION_TARGET
            - NOTIFICATION_TEMPLATE
            - NOTIFICATION_REQUEST
            - NOTIFICATION
            - NOTIFICATION_RULE
            - QUEUE_STATS
            - OAUTH2_CLIENT
            - DOMAIN
            - MOBILE_APP
            - MOBILE_APP_BUNDLE
            - CALCULATED_FIELD
            - JOB
            - ADMIN_SETTINGS
            - AI_MODEL
            - API_KEY
          multiRootEntityIds:
            type: array
            items:
              type: string
            uniqueItems: true
          direction:
            type: string
            enum:
            - FROM
            - TO
          filters:
            type: array
            items:
              $ref: '#/components/schemas/RelationEntityTypeFilter'
          maxLevel:
            type: integer
            format: int32
          fetchLastLevelOnly:
            type: boolean
          negate:
            type: boolean
          rootStateEntity:
            type: boolean
          defaultStateEntity:
            $ref: '#/components/schemas/AliasEntityId'
          multiRoot:
            type: boolean
    SimpleCalculatedFieldConfiguration:
      type: object
      properties:
        arguments:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Argument'
          minProperties: 1
        expression:
          type: string
        output:
          oneOf:
          - $ref: '#/components/schemas/AttributesOutput'
          - $ref: '#/components/schemas/TimeSeriesOutput'
        useLatestTs:
          type: boolean
      required:
      - arguments
      - output
    SingleEntityFilter:
      allOf:
      - $ref: '#/components/schemas/EntityFilter'
      - type: object
        properties:
          singleEntity:
            $ref: '#/components/schemas/AliasEntityId'
    StringFilterPredicate:
      allOf:
      - $ref: '#/components/schemas/KeyFilterPredicate'
      - type: object
        properties:
          operation:
            type: string
            enum:
            - EQUAL
            - NOT_EQUAL
            - STARTS_WITH
            - ENDS_WITH
            - CONTAINS
            - NOT_CONTAINS
            - IN
            - NOT_IN
          value:
            $ref: '#/components/schemas/FilterPredicateValueString'
          ignoreCase:
            type: boolean
    TenantId:
      type: object
      properties:
        id:
