capability: thingsboard.devices
version: 0.1.0
description: Provision, list, retrieve, update, and delete ThingsBoard IoT devices.
provider: thingsboard
api: thingsboard-devices-api
openapi: ../openapi/thingsboard-devices-openapi.yml
operations:
  - id: listDevices
    method: GET
    path: /api/tenant/devices
    summary: List tenant devices with pagination and optional type filter.
  - id: getDeviceById
    method: GET
    path: /api/device/{deviceId}
    summary: Retrieve a device by its UUID.
  - id: saveDevice
    method: POST
    path: /api/device
    summary: Create or update a device (provide id to update).
  - id: deleteDevice
    method: DELETE
    path: /api/device/{deviceId}
    summary: Delete a device by id.
  - id: assignToCustomer
    method: POST
    path: /api/customer/{customerId}/device/{deviceId}
    summary: Assign a device to a customer.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - Devices
  - Provisioning
