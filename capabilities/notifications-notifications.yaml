capability: thingsboard.notifications
version: 0.1.0
description: Manage notification rules, templates, targets, and delivery channels (email, SMS, Slack, MS Teams, mobile, web).
provider: thingsboard
api: thingsboard-notifications-api
openapi: ../openapi/thingsboard-notifications-openapi.yml
operations:
  - id: listNotifications
    method: GET
    path: /api/notifications
    summary: List recipient notifications.
  - id: createNotificationRequest
    method: POST
    path: /api/notification/request
    summary: Send a notification request to targets.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - Notifications
  - Messaging
