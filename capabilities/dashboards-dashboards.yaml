capability: thingsboard.dashboards
version: 0.1.0
description: Create, list, share, and manage ThingsBoard dashboards and widget bundles.
provider: thingsboard
api: thingsboard-dashboards-api
openapi: ../openapi/thingsboard-dashboards-openapi.yml
operations:
  - id: listDashboards
    method: GET
    path: /api/tenant/dashboards
    summary: List tenant dashboards.
  - id: getDashboard
    method: GET
    path: /api/dashboard/{dashboardId}
    summary: Retrieve a dashboard by id.
  - id: saveDashboard
    method: POST
    path: /api/dashboard
    summary: Create or update a dashboard.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - Dashboards
  - Visualization
