capability: thingsboard.rule_engine
version: 0.1.0
description: Manage Rule Chains and Rule Nodes for data processing, transformation, and alarm generation.
provider: thingsboard
api: thingsboard-rule-engine-api
openapi: ../openapi/thingsboard-rule-engine-openapi.yml
operations:
  - id: listRuleChains
    method: GET
    path: /api/ruleChains
    summary: List tenant rule chains.
  - id: getRuleChain
    method: GET
    path: /api/ruleChain/{ruleChainId}
    summary: Retrieve a rule chain by id.
  - id: saveRuleChain
    method: POST
    path: /api/ruleChain
    summary: Create or update a rule chain.
  - id: postTelemetryToRuleEngine
    method: POST
    path: /api/rule-engine/{entityType}/{entityId}/{timeout}
    summary: Push a message into the rule engine for an entity.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - RuleEngine
  - Automation
