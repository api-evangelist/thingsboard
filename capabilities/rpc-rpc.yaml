capability: thingsboard.rpc
version: 0.1.0
description: Send one-way and two-way Remote Procedure Calls to ThingsBoard devices.
provider: thingsboard
api: thingsboard-rpc-api
openapi: ../openapi/thingsboard-rpc-openapi.yml
operations:
  - id: oneWayRpc
    method: POST
    path: /api/rpc/oneway/{deviceId}
    summary: Send a one-way RPC to a device (fire-and-forget).
  - id: twoWayRpc
    method: POST
    path: /api/rpc/twoway/{deviceId}
    summary: Send a two-way RPC and await the device response.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - RPC
  - DeviceControl
