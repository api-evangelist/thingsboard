capability: thingsboard.edge
version: 0.1.0
description: Manage ThingsBoard Edge instances — provisioning, syncing, and event monitoring.
provider: thingsboard
api: thingsboard-edge-api
openapi: ../openapi/thingsboard-edge-openapi.yml
operations:
  - id: listEdges
    method: GET
    path: /api/tenant/edges
    summary: List edge instances for the current tenant.
  - id: getEdge
    method: GET
    path: /api/edge/{edgeId}
    summary: Retrieve an edge by id.
  - id: saveEdge
    method: POST
    path: /api/edge
    summary: Create or update an edge.
  - id: syncEdge
    method: POST
    path: /api/edge/sync/{edgeId}
    summary: Trigger a synchronization to the edge instance.
auth:
  - bearerAuth
  - apiKeyAuth
tags:
  - IoT
  - Edge
  - Synchronization
