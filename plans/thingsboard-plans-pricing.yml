apiCommons: '0.1'
provider: thingsboard
name: ThingsBoard Plans and Pricing
description: |
  ThingsBoard ships in three forms: Community Edition (free, Apache 2.0, self-hosted), Professional Edition
  (self-hosted, subscription), and ThingsBoard Cloud (managed PaaS, multi-region). This document captures the
  publicly-listed tiers as of May 2026 in API Commons Plans 0.1 format. North-America pricing shown.
source: https://thingsboard.io/pricing/
plans:
  - id: community-edition
    name: Community Edition
    type: OpenSource
    description: |
      Free, open-source Apache 2.0 edition. Self-hosted. Unlimited devices and updates. Community support
      via GitHub, Stack Overflow, and Discord.
    entries:
      - geo: WW
        unit: 1
        label: Subscription
        price: 0
        metric: instance
        timeFrame: month
    elements:
      - name: Unlimited devices
      - name: Unlimited assets
      - name: Unlimited data points
      - name: Multi-tenancy
      - name: Rule engine, dashboards, REST/MQTT/CoAP/HTTP/LwM2M APIs
      - name: Community support

  - id: tb-cloud-free
    name: ThingsBoard Cloud — Free
    type: PaaS
    description: Managed ThingsBoard with five devices and one million data points per month.
    entries:
      - geo: NA
        unit: 1
        label: Subscription
        price: 0
        metric: tenant
        timeFrame: month
    elements:
      - name: 5 devices
      - name: 5 assets
      - name: 1M data points / month
      - name: Community support

  - id: tb-cloud-prototype
    name: ThingsBoard Cloud — Prototype
